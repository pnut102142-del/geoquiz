<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GeoQuiz App | Country Guessing Geography Quiz — Flags · Maps · Capitals · Greetings</title>

<meta name="description" content="GeoQuiz App — Guess countries using flags, maps, capitals, and greetings. Free world geography quiz with multiple difficulty levels and room multiplayer.">
<meta name="keywords" content="country quiz, geography quiz, flag quiz, capital quiz, world geography game, map quiz, GeoQuiz">
<meta name="author" content="GeoQuiz App">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://pnut102142-del.github.io/geoquiz">
<meta property="og:type" content="website">
<meta property="og:url" content="https://pnut102142-del.github.io/geoquiz">
<meta property="og:title" content="GeoQuiz App | Country Geography Quiz">
<meta property="og:description" content="Guess countries using flags, maps, capitals, and greetings.">
<meta property="og:site_name" content="GeoQuiz App">
<meta property="og:locale" content="en_US">

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#070d1a;--surface:#0e1829;--surface2:#15233a;--border:rgba(255,255,255,0.07);--text:#dde6f4;--muted:#4d6280;--r:18px;--accent:#60a5fa}
body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh;display:flex;align-items:flex-start;justify-content:center;padding:24px 16px 48px}
.screen{display:none;width:100%;max-width:780px}
.screen.active{display:block}
.hero{text-align:center;padding:40px 0 44px}
.hero-title{font-size:2.5rem;font-weight:900}
.mode-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(215px,1fr));gap:13px}
.mode-card{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:22px;cursor:pointer}
.join-section{background:var(--surface);border:1.5px solid var(--border);border-radius:18px;padding:20px;margin-top:10px}
.room-input{width:100%;padding:10px;border-radius:10px;background:var(--surface2);color:var(--text)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:none;align-items:center;justify-content:center}
.modal-overlay.active{display:flex}
.modal-box{background:var(--surface);border-radius:18px;padding:20px;width:92vw;max-width:520px}
.answers-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.ans-btn{background:var(--surface);border:1px solid var(--border);padding:12px;border-radius:12px;color:var(--text)}
.result-wrap{background:var(--surface);padding:30px;border-radius:18px}
</style>
</head>
<body>

<div id="home" class="screen active">
  <div class="hero">
    <div style="font-size:4rem">🌍</div>
    <h1 class="hero-title">GeoQuiz App</h1>
    <p>World Geography Quiz — Flags · Maps · Capitals · Greetings</p>
  </div>

  <div class="mode-grid">
    <div class="mode-card" onclick="openSettings('flag')">Flag Quiz 🚩</div>
    <div class="mode-card" onclick="openSettings('map')">Map Quiz 🗺️</div>
    <div class="mode-card" onclick="openSettings('cap2ctry')">Capital → Country</div>
    <div class="mode-card" onclick="openSettings('ctry2cap')">Country → Capital</div>
    <div class="mode-card" onclick="openSettings('lang')">Greeting Quiz 👋</div>
  </div>

  <div class="join-section">
    <input id="room-input" class="room-input" placeholder="FLAG-10-30-H-4829" oninput="this.value=this.value.toUpperCase()">
    <button onclick="joinRoom()">Join Room</button>
  </div>
</div>

<div class="modal-overlay" id="settings-modal">
  <div class="modal-box">
    <h2>Settings</h2>
    <button onclick="confirmSettings()">Start Quiz</button>
  </div>
</div>

<div id="quiz" class="screen">
  <div id="q-card"></div>
  <div class="answers-grid" id="answers"></div>
</div>

<div id="result" class="screen">
  <div class="result-wrap">
    <h2>Result</h2>
    <div id="r-score"></div>
    <input id="lb-name" placeholder="Enter name">
    <button style="display:none" id="lb-save-btn">Save</button>
    <div id="lb-list"></div>
  </div>
</div>

<script>
const FB_URL='https://geoquiz-87a6f-default-rtdb.europe-west1.firebasedatabase.app';
let autoSaved=false;

async function fbPush(p,v){await fetch(FB_URL+p+'.json',{method:'POST',body:JSON.stringify(v)});}

async function autoSaveScore(){
if(autoSaved)return;
autoSaved=true;
const name=document.getElementById('lb-name').value||'Anonymous';
const rc=getRoomCode().replace(/-/g,'_');
await fbPush('/scores/'+rc,{name,score:window.score||0,ts:Date.now()});
loadLeaderboard();
}

function getRoomCode(){return"FLAG-10-30-H-0000";}

function showResult(){
document.getElementById('result').classList.add('active');
autoSaveScore();
}

function loadLeaderboard(){}
function openSettings(){}
function confirmSettings(){}
function joinRoom(){}
</script>

</body>
</html>
